[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Keep npm on a modern version aligned with Node 20 image
  NPM_VERSION = "10"

# SPA redirect — send all routes to index.html so React Router handles them
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
