[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/favicon.ico"
  to = "/icon.svg"
  status = 200

# SPA fallback so React Router routes don't 404 on refresh/direct load
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
